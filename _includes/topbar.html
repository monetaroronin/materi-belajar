<div class="mobile-topbar" id="mobile-topbar" style="display:flex;flex-direction:column;align-items:stretch;gap:6px;padding:8px 1rem;">

  <!-- Baris 1: Hamburger + Judul + Toggle -->
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap;">
    <button class="hamburger" id="mobile-hamburger" aria-label="Buka menu">&#9776;</button>
    <span class="site-title" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ site.title }}</span>
    <div style="display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;gap:6px;height:32px;margin-left:auto;">
      {% include dark-mode-toggle.html %}
    </div>
  </div>

  <!-- Baris 2: Tombol Cari -->
  <button id="search-trigger" type="button" aria-label="Cari"
    style="display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 20px;
           border-radius:999px;border:1.5px solid #e5e7eb;background:#ffffff;
           cursor:pointer;color:#374151;font-family:'Nunito',sans-serif;
           font-size:0.75rem;font-weight:700;letter-spacing:0.04em;
           box-shadow:0 1px 4px rgba(0,0,0,0.07);white-space:nowrap;width:auto;align-self:flex-start;">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
         viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Cari...
  </button>

</div>

<!-- Search Overlay -->
<div id="search-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9998;">
</div>

<!-- Search Panel -->
<div id="search-panel" style="display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);
     width:min(600px,90vw);background:#fff;border-radius:14px;
     box-shadow:0 12px 40px rgba(0,0,0,0.2);z-index:9999;overflow:hidden;">

  <!-- Input -->
  <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #f3f4f6;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
         viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search-input" type="text" placeholder="Cari artikel..."
      style="flex:1;border:none;outline:none;font-size:0.95rem;
             font-family:'Nunito',sans-serif;color:#111827;background:transparent;">
    <button id="search-close" style="background:none;border:none;cursor:pointer;
            color:#9ca3af;font-size:1rem;padding:0;line-height:1;flex-shrink:0;">✕ Tutup</button>
  </div>

  <!-- Results -->
  <div id="search-results-list" style="max-height:480px;overflow-y:auto;"></div>
</div>

<script>
(function() {
  var trigger = document.getElementById('search-trigger');
  var overlay = document.getElementById('search-overlay');
  var panel = document.getElementById('search-panel');
  var input = document.getElementById('search-input');
  var closeBtn = document.getElementById('search-close');
  var resultsList = document.getElementById('search-results-list');
  var baseurl = '{{ site.baseurl }}';
  var searchData = null;
  var debounce;

  function openSearch() {
    overlay.style.display = 'block';
    panel.style.display = 'block';
    input.focus();
    if (!searchData) loadData();
  }

  function closeSearch() {
    overlay.style.display = 'none';
    panel.style.display = 'none';
    input.value = '';
    resultsList.innerHTML = '';
  }

  function loadData() {
    fetch(baseurl + '/assets/js/data/search.json')
      .then(function(r) { return r.json(); })
      .then(function(data) { searchData = data; })
      .catch(function() {});
  }

  function doSearch(q) {
    if (!q || q.length < 2) {
      resultsList.innerHTML = '';
      return;
    }
    if (!searchData) return;

    var found = searchData.filter(function(p) {
      return (p.title && p.title.toLowerCase().includes(q)) ||
             (p.content && p.content.toLowerCase().includes(q)) ||
             (p.categories && p.categories.toLowerCase().includes(q)) ||
             (p.tags && p.tags.toLowerCase().includes(q));
    }).slice(0, 8);

    if (!found.length) {
      resultsList.innerHTML = '<div style="padding:20px;text-align:center;color:#6b7280;font-size:0.9rem;">Tidak ada hasil untuk "<b>' + q + '</b>"</div>';
      return;
    }

    resultsList.innerHTML = found.map(function(p) {
      var excerpt = p.content ? p.content.substring(0, 120) + '...' : '';
      var cats = p.categories
        ? '<span style="color:#7c3aed;font-size:0.75rem;font-weight:600;">' + p.categories + '</span>'
        : '';
      var date = p.date
        ? '<span style="color:#9ca3af;font-size:0.75rem;">' + p.date.substring(0,10) + '</span>'
        : '';
      return '<a href="' + p.url + '" style="display:block;padding:14px 18px;text-decoration:none;color:inherit;border-bottom:1px solid #f3f4f6;border-left:3px solid #7c3aed;" onmouseover="this.style.background=\'#faf5ff\'" onmouseout="this.style.background=\'#fff\'">'
        + '<div style="font-weight:700;font-size:0.95rem;color:#111827;margin-bottom:5px;">' + p.title + '</div>'
        + '<div style="color:#6b7280;font-size:0.82rem;line-height:1.5;margin-bottom:6px;">' + excerpt + '</div>'
        + '<div style="display:flex;gap:10px;align-items:center;">' + cats + date + '</div>'
        + '</a>';
    }).join('');
  }

  trigger.addEventListener('click', openSearch);
  closeBtn.addEventListener('click', closeSearch);
  overlay.addEventListener('click', closeSearch);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeSearch();
  });

  input.addEventListener('input', function() {
    clearTimeout(debounce);
    debounce = setTimeout(function() { doSearch(input.value.trim().toLowerCase()); }, 200);
  });
})();
</script>
