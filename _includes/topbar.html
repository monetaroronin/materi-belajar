<div class="mobile-topbar" id="mobile-topbar">
  <button class="hamburger" id="mobile-hamburger" aria-label="Buka menu">&#9776;</button>
  <span class="site-title" style="flex:1;">{{ site.title }}</span>
  <button id="search-trigger" type="button" aria-label="Cari"
    style="display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;
           border-radius:999px;border:1.5px solid #e5e7eb;background:#ffffff;
           cursor:pointer;color:#374151;font-family:'Nunito',sans-serif;
           font-size:0.75rem;font-weight:700;letter-spacing:0.04em;
           box-shadow:0 1px 4px rgba(0,0,0,0.07);flex-shrink:0;">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
         viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Cari
  </button>
  {% include dark-mode-toggle.html %}
</div>

<!-- Search Modal -->
<div id="search-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:flex-start;justify-content:center;padding-top:80px;">
  <div style="background:#fff;border-radius:12px;width:90%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;">
    <div style="display:flex;align-items:center;padding:16px;border-bottom:1px solid #e5e7eb;gap:10px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder="Cari artikel..."
        style="flex:1;border:none;outline:none;font-size:1rem;font-family:'Nunito',sans-serif;color:#111827;">
      <button id="search-close" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:1.2rem;">✕</button>
    </div>
    <div id="search-results-container" style="max-height:400px;overflow-y:auto;padding:8px 0;"></div>
  </div>
</div>

<script>
(function() {
  var overlay = document.getElementById('search-modal-overlay');
  var input = document.getElementById('search-input');
  var results = document.getElementById('search-results-container');
  var trigger = document.getElementById('search-trigger');
  var close = document.getElementById('search-close');
  var searchData = null;
  var baseurl = '{{ site.baseurl }}';

  function openModal() {
    overlay.style.display = 'flex';
    input.focus();
    if (!searchData) loadSearchData();
  }

  function closeModal() {
    overlay.style.display = 'none';
    input.value = '';
    results.innerHTML = '';
  }

  function loadSearchData() {
    fetch(baseurl + '/assets/js/data/search.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        searchData = data;
      })
      .catch(function() {
        results.innerHTML = '<p style="padding:16px;color:#6b7280;">Gagal memuat data pencarian.</p>';
      });
  }

  function doSearch(query) {
    if (!query || query.length < 2) {
      results.innerHTML = '';
      return;
    }
    if (!searchData) {
      results.innerHTML = '<p style="padding:16px;color:#6b7280;">Memuat...</p>';
      return;
    }
    var q = query.toLowerCase();
    var found = searchData.filter(function(post) {
      return (post.title && post.title.toLowerCase().includes(q)) ||
             (post.content && post.content.toLowerCase().includes(q)) ||
             (post.categories && post.categories.toLowerCase().includes(q)) ||
             (post.tags && post.tags.toLowerCase().includes(q));
    }).slice(0, 8);

    if (found.length === 0) {
      results.innerHTML = '<p style="padding:16px;color:#6b7280;text-align:center;">Tidak ada hasil untuk "<strong>' + query + '</strong>"</p>';
      return;
    }

    results.innerHTML = found.map(function(post) {
      var snippet = post.content ? post.content.substring(0, 100) + '...' : '';
      var cats = post.categories ? '<span style="color:#7c3aed;font-size:0.75rem;">' + post.categories + '</span>' : '';
      return '<a href="' + post.url + '" style="display:block;padding:12px 16px;text-decoration:none;color:inherit;border-bottom:1px solid #f3f4f6;" onmouseover="this.style.background=\'#f9fafb\'" onmouseout="this.style.background=\'\'">'+
        '<div style="font-weight:700;color:#111827;margin-bottom:4px;">' + post.title + '</div>' +
        cats +
        '<div style="color:#6b7280;font-size:0.85rem;margin-top:4px;">' + snippet + '</div>' +
        '</a>';
    }).join('');
  }

  trigger.addEventListener('click', openModal);
  close.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  var debounce;
  input.addEventListener('input', function() {
    clearTimeout(debounce);
    debounce = setTimeout(function() { doSearch(input.value.trim()); }, 200);
  });
})();
</script>
