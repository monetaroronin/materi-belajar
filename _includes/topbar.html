<!-- Mobile Topbar -->
<div class="mobile-topbar" id="mobile-topbar">
  <button class="hamburger" id="mobile-hamburger" aria-label="Buka menu">&#9776;</button>
  <span class="site-title">{{ site.title }}</span>
  {% include dark-mode-toggle.html %}
</div>

<script>
(function () {
  function init() {
    var ham     = document.getElementById('mobile-hamburger');
    var sidebar = document.getElementById('sidebar');
    if (!ham || !sidebar) return;

    /* ── Paksa sidebar selalu visible di mobile sebelum dibuka ── */
    function forceSidebarReset() {
      if (window.innerWidth <= 1199) {
        sidebar.style.removeProperty('display');
        sidebar.style.removeProperty('transform');
        sidebar.style.removeProperty('visibility');
        sidebar.style.removeProperty('opacity');
      }
    }

    function openSidebar() {
      forceSidebarReset();
      document.body.classList.add('sidebar-open');
      sidebar.classList.add('sidebar-open');
      ham.innerHTML = '&#10005;';
      ham.setAttribute('aria-label', 'Tutup menu');
    }

    function closeSidebar() {
      document.body.classList.remove('sidebar-open');
      sidebar.classList.remove('sidebar-open');
      ham.innerHTML = '&#9776;';
      ham.setAttribute('aria-label', 'Buka menu');
    }

    /* Toggle saat klik hamburger */
    ham.addEventListener('click', function (e) {
      e.stopPropagation();
      document.body.classList.contains('sidebar-open') ? closeSidebar() : openSidebar();
    });

    /* Tutup saat klik overlay di luar sidebar */
    document.addEventListener('click', function (e) {
      if (!document.body.classList.contains('sidebar-open')) return;
      if (!sidebar.contains(e.target) && !ham.contains(e.target)) {
        closeSidebar();
      }
    });

    /* Tutup saat klik link di dalam sidebar */
    sidebar.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', closeSidebar);
    });

    /* Tutup jika resize ke desktop */
    window.addEventListener('resize', function () {
      if (window.innerWidth > 1199) {
        closeSidebar();
      }
    });

    /* Tutup dengan tombol Escape */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && document.body.classList.contains('sidebar-open')) {
        closeSidebar();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
